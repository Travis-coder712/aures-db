name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install AURES dependencies
        working-directory: frontend
        run: npm ci

      - name: Build AURES
        working-directory: frontend
        run: npm run build

      - name: Generate version.json
        working-directory: frontend
        run: |
          mkdir -p dist/data/metadata
          VERSION=$(node -p "require('./package.json').version")
          echo "{\"version\":\"${VERSION}\",\"built_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > dist/data/metadata/version.json
          echo "Published version.json: v${VERSION}"

      - name: Stand up redirects for relocated sibling PWAs
        run: |
          # Brisbane Builder Guide redirect
          mkdir -p frontend/dist/builders
          cat > frontend/dist/builders/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Moved — Brisbane Builder Guide</title>
            <meta http-equiv="refresh" content="2; url=https://travis-coder712.github.io/brisbane-builder-guide/">
            <link rel="canonical" href="https://travis-coder712.github.io/brisbane-builder-guide/">
            <style>body{font-family:-apple-system,sans-serif;background:#0f1117;color:#e6e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.box{text-align:center;padding:40px;max-width:480px}h1{font-size:22px;margin:0 0 12px}p{color:#9ca0b5;margin:0 0 16px;line-height:1.5}a{color:#6b8cff}</style>
          </head>
          <body><div class="box"><h1>Brisbane Builder Guide has moved</h1><p>You should be redirected automatically. If not, click below:</p><p><a href="https://travis-coder712.github.io/brisbane-builder-guide/">travis-coder712.github.io/brisbane-builder-guide/</a></p></div></body>
          </html>
          HTMLEOF
          # Acknowledge Country redirect
          mkdir -p frontend/dist/country
          cat > frontend/dist/country/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Moved — Acknowledge Country</title>
            <meta http-equiv="refresh" content="2; url=https://travis-coder712.github.io/acknowledge-country/">
            <link rel="canonical" href="https://travis-coder712.github.io/acknowledge-country/">
            <style>body{font-family:-apple-system,sans-serif;background:#0f1117;color:#e6e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.box{text-align:center;padding:40px;max-width:480px}h1{font-size:22px;margin:0 0 12px}p{color:#9ca0b5;margin:0 0 16px;line-height:1.5}a{color:#6b8cff}</style>
          </head>
          <body><div class="box"><h1>Acknowledge Country has moved</h1><p>You should be redirected automatically. If not, click below:</p><p><a href="https://travis-coder712.github.io/acknowledge-country/">travis-coder712.github.io/acknowledge-country/</a></p></div></body>
          </html>
          HTMLEOF
          echo "Wrote redirect stubs at /builders/ and /country/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
