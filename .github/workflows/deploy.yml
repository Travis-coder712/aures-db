name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            acknowledge-country/package-lock.json

      - name: Install AURES dependencies
        working-directory: frontend
        run: npm ci

      - name: Build AURES
        working-directory: frontend
        run: npm run build

      - name: Generate version.json
        working-directory: frontend
        run: |
          mkdir -p dist/data/metadata
          VERSION=$(node -p "require('./package.json').version")
          echo "{\"version\":\"${VERSION}\",\"built_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > dist/data/metadata/version.json
          echo "Published version.json: v${VERSION}"

      - name: Install Acknowledge Country dependencies
        working-directory: acknowledge-country
        run: npm ci

      - name: Build Acknowledge Country PWA
        working-directory: acknowledge-country
        run: npm run build

      - name: Copy Acknowledge Country into AURES dist
        run: cp -r acknowledge-country/dist frontend/dist/country

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
